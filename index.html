<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tecno Shark | تسجيل الدخول</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
        }
        
        body.english {
            direction: ltr;
        }
        
        body.english .input-group label {
            text-align: left;
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .lang-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            z-index: 100;
        }
        
        .lang-switch:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1e3a5f, #0f2b3d);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 30px -10px rgba(30, 58, 95, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .logo::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .logo-content {
            text-align: center;
            z-index: 1;
        }
        
        .logo-content .main-letter {
            font-size: 42px;
            font-weight: 800;
            color: white;
            letter-spacing: -2px;
        }
        
        .logo-content .small-text {
            font-size: 10px;
            color: #10b981;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #1e3a5f, #0f2b3d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        .input-group label {
            display: block;
            text-align: right;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .username-wrapper {
            position: relative;
        }
        
        .username-suffix {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #10b981;
            font-size: 14px;
            font-weight: 500;
            background: white;
            padding-right: 5px;
            pointer-events: none;
        }
        
        .username-wrapper input {
            padding-left: 110px;
        }
        
        .next-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }
        
        .next-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-btn {
            width: 100%;
            background: transparent;
            border: 2px solid #e5e7eb;
            color: #374151;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .back-btn:hover {
            background: #f3f4f6;
            border-color: #10b981;
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }
        
        .links a {
            color: #10b981;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border-right: 4px solid #dc2626;
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #059669;
            border-right: 4px solid #059669;
            display: block;
        }
        
        .suggestions {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .suggestion-badge {
            background: #f3f4f6;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #374151;
        }
        
        .suggestion-badge:hover {
            background: #10b981;
            color: white;
        }
        
        .terms-box {
            background: #f9fafb;
            border-radius: 16px;
            padding: 20px;
            text-align: right;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .terms-box h3 {
            color: #1e3a5f;
            margin-bottom: 15px;
        }
        
        .terms-box p {
            color: #4b5563;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .agree-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .step-dot {
            width: 8px;
            height: 8px;
            background: #e5e7eb;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .step-dot.active {
            width: 24px;
            background: #10b981;
            border-radius: 4px;
        }
        
        .step-dot.completed {
            background: #10b981;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<button class="lang-switch" id="langSwitch">
    <i class="fas fa-globe"></i>
    <span>English</span>
</button>

<div class="login-container" id="app"></div>
<div id="toast" class="toast"></div>

<script>
    // ==================== إعدادات Firebase ====================
   const firebaseConfig = {
    apiKey: "AIzaSyDLndo0o-Bf67Sw8_n84pM-__ErB3SuTx4",  // ✅ المفتاح الجديد
    authDomain: "tecno-shark.firebaseapp.com",
    databaseURL: "https://tecno-shark-default-rtdb.firebaseio.com",
    projectId: "tecno-shark",
    storageBucket: "tecno-shark.firebasestorage.app",
    messagingSenderId: "536495831614",
    appId: "1:536495831614:web:e113969218666828496f6f",
    measurementId: "G-ECZYM05D0S"
};

    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // ==================== المتغيرات العامة ====================
    let currentStep = 'login';
    let currentLang = 'ar';
    let tempUserData = {
        firstName: '',
        lastName: '',
        phone: '',
        username: '',
        password: ''
    };
    let resetUserData = null;
    let returnToUrl = null;
    
    // ==================== دوال مساعدة ====================
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function showMessage(msg, isError) {
        const box = document.getElementById('messageBox');
        if (box) {
            box.textContent = msg;
            box.className = 'message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                if (box) box.className = 'message';
            }, 3000);
        }
    }
    
    function maskUsername(username) {
        if (!username) return '';
        if (username.length <= 4) return username;
        return username.substring(0, 2) + '***' + username.substring(username.length - 2);
    }
    
    // الحصول على رابط العودة
    function getReturnUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let returnUrl = urlParams.get('returnUrl');
        
        if (!returnUrl && document.referrer) {
            returnUrl = document.referrer;
        }
        
        if (!returnUrl) {
            returnUrl = 'https://mohamedemadmaxplas.github.io/nabd-wabsaite/';
        }
        
        returnToUrl = returnUrl;
        return returnUrl;
    }
    
   async function checkIdentifier() {
    const identifier = document.getElementById('loginIdentifier').value.trim();
    
    if (!identifier) {
        showMessage('الرجاء إدخال رقم الهاتف أو اسم المستخدم', true);
        return;
    }
    
    // معالجة اسم المستخدم
    let cleanIdentifier = identifier.replace(/@tecno\.shark$/i, '');
    let fullIdentifier = cleanIdentifier + '@tecno.shark';
    
    try {
        // تجربة طريقة مختلفة تماماً للوصول للبيانات
        console.log('جاري محاولة قراءة البيانات...');
        
        // استخدام REST API مباشرة
        const response = await fetch('https://mindful-marking-493119-d0-default-rtdb.firebaseio.com/users.json');
        
        if (!response.ok) {
            throw new Error('فشل الاتصال بقاعدة البيانات');
        }
        
        const data = await response.json();
        console.log('البيانات المستلمة:', data);
        
        if (!data) {
            showMessage('لا يوجد حسابات مسجلة', true);
            return;
        }
        
        let foundUser = null;
        let foundUid = null;
        
        for (let uid in data) {
            const user = data[uid];
            if (user.phone === identifier) {
                foundUser = user;
                foundUid = uid;
                break;
            }
            if (user.username === fullIdentifier) {
                foundUser = user;
                foundUid = uid;
                break;
            }
        }
        
        if (!foundUser) {
            showMessage('لا يوجد حساب بهذه البيانات', true);
            return;
        }
        
        resetUserData = { uid: foundUid, ...foundUser };
        currentStep = 'reset';
        render();
        
    } catch (error) {
        console.error('خطأ في التحقق:', error);
        showMessage('حدث خطأ في الاتصال بقاعدة البيانات: ' + error.message, true);
    }
}
    
    function goToLogin() {
        currentStep = 'login';
        render();
    }
    
    function goToForgot() {
        currentStep = 'forgot';
        render();
    }
    
    // ==================== دوال تسجيل الدخول ====================

async function tecnoLogin() {
    let username = document.getElementById('tecnoUser')?.value.trim();
    const password = document.getElementById('tecnoPass')?.value;
    
    if (!username || !password) {
        showMessage('الرجاء إدخال اسم المستخدم وكلمة المرور', true);
        return;
    }
    
    let cleanUsername = username.replace(/@tecno\.shark$/i, '');
    let fullUsername = cleanUsername + '@tecno.shark';
    const email = cleanUsername + '@tecno.com';
    
    try {
        // البحث عن المستخدم في قاعدة البيانات أولاً
        const userSnapshot = await db.ref('users').orderByChild('username').equalTo(fullUsername).once('value');
        let found = null;
        let foundUid = null;
        
        if (userSnapshot.exists()) {
            userSnapshot.forEach((child) => {
                found = child.val();
                foundUid = child.key;
            });
        }
        
        if (!found || found.password !== password) {
            showMessage('اسم المستخدم أو كلمة المرور غير صحيحة', true);
            return;
        }
        
        // محاولة تسجيل الدخول إلى Firebase Authentication
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (authError) {
            if (authError.code === 'auth/user-not-found') {
                // إذا لم يكن موجوداً في Authentication، قم بإنشائه
                await auth.createUserWithEmailAndPassword(email, password);
            } else {
                throw authError;
            }
        }
        
        // تحديث آخر تسجيل دخول
        await db.ref(`users/${auth.currentUser.uid}/lastLogin`).set(new Date().toISOString());
        
        const returnUrl = getReturnUrl();
        showMessage('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', false);
        
        setTimeout(() => {
            window.location.href = returnUrl;
        }, 1500);
        
    } catch (error) {
        console.error(error);
        showMessage('حدث خطأ في تسجيل الدخول: ' + error.message, true);
    }
}
    
    // ==================== دوال استعادة كلمة المرور ====================
    async function verifyPhone() {
        const phone = document.getElementById('forgotPhone').value.trim();
        if (!phone) {
            showMessage('الرجاء إدخال رقم الهاتف', true);
            return;
        }
        
        try {
            const phoneSnapshot = await db.ref('users').orderByChild('phone').equalTo(phone).once('value');
            let foundUser = null;
            let foundUid = null;
            
            if (phoneSnapshot.exists()) {
                phoneSnapshot.forEach((child) => {
                    foundUser = child.val();
                    foundUid = child.key;
                });
            }
            
            if (!foundUser) {
                showMessage('لا يوجد حساب بهذا الرقم', true);
                return;
            }
            
            resetUserData = { uid: foundUid, ...foundUser };
            currentStep = 'reset';
            render();
            
        } catch (error) {
            showMessage('حدث خطأ', true);
        }
    }
    
    async function resetPassword() {
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        if (!newPass || !confirmPass) {
            showMessage('الرجاء إدخال كلمة المرور', true);
            return;
        }
        
        if (newPass !== confirmPass) {
            showMessage('كلمة المرور غير متطابقة', true);
            return;
        }
        
        if (newPass.length < 6) {
            showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
            return;
        }
        
        if (!resetUserData) {
            showMessage('حدث خطأ، حاول مرة أخرى', true);
            return;
        }
        
        try {
            await db.ref(`users/${resetUserData.uid}/password`).set(newPass);
            
            const email = resetUserData.email;
            try {
                await auth.signInWithEmailAndPassword(email, newPass);
            } catch {
                await auth.createUserWithEmailAndPassword(email, newPass);
            }
            
            const returnUrl = getReturnUrl();
            showMessage('✅ تم تغيير كلمة المرور بنجاح! جاري التحويل...', false);
            
            setTimeout(() => {
                window.location.href = returnUrl;
            }, 1500);
            
        } catch (error) {
            showMessage('حدث خطأ', true);
        }
    }
    
    // ==================== دوال إنشاء حساب ====================
    function goToRegister() {
        tempUserData = { firstName: '', lastName: '', phone: '', username: '', password: '' };
        currentStep = 'register-step1';
        render();
    }
    
    function goToRegisterStep1() {
        currentStep = 'register-step1';
        render();
    }
    
    function goToRegisterStep2() {
        const firstName = document.getElementById('firstName')?.value.trim();
        const lastName = document.getElementById('lastName')?.value.trim();
        
        if (!firstName || !lastName) {
            showMessage('الرجاء إدخال الاسم الأول والاسم الأخير', true);
            return;
        }
        
        tempUserData.firstName = firstName;
        tempUserData.lastName = lastName;
        currentStep = 'register-step2';
        render();
    }
    
    function goToRegisterStep3() {
        const phone = document.getElementById('phone')?.value.trim();
        
        if (!phone) {
            showMessage('الرجاء إدخال رقم الهاتف', true);
            return;
        }
        
        if (phone.length < 10) {
            showMessage('رقم الهاتف غير صحيح', true);
            return;
        }
        
        tempUserData.phone = phone;
        currentStep = 'register-step3';
        render();
    }
    
    async function checkUsernameAvailability() {
        const usernameInput = document.getElementById('username');
        if (!usernameInput) return;
        
        const username = usernameInput.value.trim();
        const errorDiv = document.getElementById('usernameError');
        const nextBtn = document.getElementById('nextBtn3');
        const suggestionsDiv = document.getElementById('suggestions');
        
        if (!username || username.length < 3) {
            if (errorDiv) errorDiv.style.display = 'none';
            if (nextBtn) nextBtn.disabled = true;
            if (suggestionsDiv) suggestionsDiv.innerHTML = '';
            return;
        }
        
        try {
            const fullUsername = username + '@tecno.shark';
            const userSnapshot = await db.ref('users').orderByChild('username').equalTo(fullUsername).once('value');
            const exists = userSnapshot.exists();
            
            if (exists) {
                if (errorDiv) {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = '⚠️ اسم المستخدم موجود بالفعل';
                }
                if (nextBtn) nextBtn.disabled = true;
                
                const suggestions = [
                    username + Math.floor(Math.random() * 100),
                    username + '_' + Math.floor(Math.random() * 1000),
                    username + new Date().getFullYear(),
                    username + '_official'
                ];
                
                if (suggestionsDiv) {
                    suggestionsDiv.innerHTML = suggestions.map(s => 
                        `<span class="suggestion-badge" onclick="useSuggestion('${s}')">${s}@tecno.shark</span>`
                    ).join('');
                }
            } else {
                if (errorDiv) errorDiv.style.display = 'none';
                if (nextBtn) nextBtn.disabled = false;
                if (suggestionsDiv) suggestionsDiv.innerHTML = '';
            }
        } catch (error) {
            console.error('خطأ في التحقق:', error);
            if (nextBtn) nextBtn.disabled = false;
        }
    }
    
    function useSuggestion(suggestion) {
        const usernameInput = document.getElementById('username');
        if (usernameInput) {
            usernameInput.value = suggestion;
            checkUsernameAvailability();
        }
    }
    
    function goToRegisterStep4() {
        const username = document.getElementById('username')?.value.trim();
        
        if (!username) {
            showMessage('الرجاء إدخال اسم المستخدم', true);
            return;
        }
        
        if (username.length < 3) {
            showMessage('اسم المستخدم يجب أن يكون 3 أحرف على الأقل', true);
            return;
        }
        
        tempUserData.username = username + '@tecno.shark';
        currentStep = 'register-step4';
        render();
    }
    
    function goToTerms() {
        const password = document.getElementById('password')?.value;
        const confirmPassword = document.getElementById('confirmPassword')?.value;
        
        if (!password) {
            showMessage('الرجاء إدخال كلمة المرور', true);
            return;
        }
        
        if (password !== confirmPassword) {
            showMessage('كلمة المرور غير متطابقة', true);
            return;
        }
        
        if (password.length < 6) {
            showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
            return;
        }
        
        tempUserData.password = password;
        currentStep = 'register-terms';
        render();
    }
    
    async function completeRegistration() {
    const email = tempUserData.username.split('@')[0] + '@tecno.com';
    
    // إظهار رسالة انتظار
    showMessage('جاري إنشاء الحساب...', false);
    
    try {
        let firebaseUser = null;
        
        // محاولة تسجيل الدخول أولاً (إذا كان الحساب موجود مسبقاً)
        try {
            // حاول تسجيل الدخول
            const userCred = await auth.signInWithEmailAndPassword(email, tempUserData.password);
            firebaseUser = userCred.user;
            console.log('تم تسجيل الدخول بحساب موجود');
        } catch (signInError) {
            // إذا فشل تسجيل الدخول، حاول إنشاء حساب جديد
            if (signInError.code === 'auth/user-not-found') {
                const userCred = await auth.createUserWithEmailAndPassword(email, tempUserData.password);
                firebaseUser = userCred.user;
                console.log('تم إنشاء حساب جديد');
            } else {
                throw signInError;
            }
        }
        
        // التحقق من وجود المستخدم في Realtime Database
        const userSnapshot = await db.ref(`users/${firebaseUser.uid}`).once('value');
        
        if (!userSnapshot.exists()) {
            // إذا لم يكن موجوداً في قاعدة البيانات، قم بإضافته
            const newUser = {
                name: tempUserData.firstName + ' ' + tempUserData.lastName,
                firstName: tempUserData.firstName,
                lastName: tempUserData.lastName,
                phone: tempUserData.phone,
                username: tempUserData.username,
                email: email,
                password: tempUserData.password,
                plan: 'free',
                createdAt: new Date().toISOString()
            };
            
            await db.ref(`users/${firebaseUser.uid}`).set(newUser);
            console.log('تم إضافة المستخدم إلى قاعدة البيانات');
        } else {
            console.log('المستخدم موجود مسبقاً في قاعدة البيانات');
        }
        
        // تأكيد تسجيل الدخول
        await auth.signInWithEmailAndPassword(email, tempUserData.password);
        
        const returnUrl = getReturnUrl();
        showMessage('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', false);
        
        setTimeout(() => {
            window.location.href = returnUrl;
        }, 2000);
        
    } catch (error) {
        console.error('خطأ كامل:', error);
        
        // رسائل خطأ مفهومة للمستخدم
        if (error.code === 'auth/email-already-in-use') {
            showMessage('⚠️ هذا البريد الإلكتروني مستخدم بالفعل. يرجى تسجيل الدخول بدلاً من ذلك.', true);
            // العودة إلى صفحة تسجيل الدخول بعد 3 ثوان
            setTimeout(() => {
                currentStep = 'login';
                render();
            }, 3000);
        } else if (error.code === 'auth/weak-password') {
            showMessage('⚠️ كلمة المرور ضعيفة. يجب أن تكون 6 أحرف على الأقل.', true);
        } else if (error.code === 'auth/invalid-email') {
            showMessage('⚠️ البريد الإلكتروني غير صالح.', true);
        } else {
            showMessage('❌ حدث خطأ: ' + error.message, true);
        }
    }
}
